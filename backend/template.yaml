AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: NIMBUS real-time backend - API Gateway WebSocket, Lambda, DynamoDB, S3, and IAM.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - staging
      - dev
    Description: Logical environment value exposed to Lambda as ENVIRONMENT.

  StageName:
    Type: String
    Default: prod
    Description: API Gateway WebSocket stage name.

  SageMakerEndpointName:
    Type: String
    Default: nimbus-prod-asl-endpoint
    Description: SageMaker endpoint name used by ProcessFrame and WarmEndpoint.

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model id used for gloss-to-English interpretation.

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    CodeUri: src/
    Timeout: 29
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
        POWERTOOLS_SERVICE_NAME: nimbus
        POWERTOOLS_METRICS_NAMESPACE: NIMBUS
        SESSIONS_TABLE: !Ref SessionsTable
        ROOMS_TABLE: !Ref RoomsTable
        TTS_BUCKET: !Ref TTSAudioBucket
        CONFIG_BUCKET: !Ref ConfigBucket
        SAGEMAKER_ENDPOINT: !Ref SageMakerEndpointName
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
        APIGW_MANAGEMENT_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

Resources:
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: NIMBUS_PROD_WS
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref StageName
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  SignalLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SignalDynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !GetAtt RoomsTable.Arn
        - PolicyName: ManageConnections
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${StageName}/POST/@connections/*

  PipelineLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PipelineDynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !GetAtt RoomsTable.Arn
        - PolicyName: PipelineS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub ${TTSAudioBucket.Arn}/*
                  - !Sub ${ConfigBucket.Arn}/*
                  - !Sub ${ArtifactsBucket.Arn}/*
        - PolicyName: AiServiceAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                  - sagemaker:DescribeEndpoint
                Resource: !Sub arn:${AWS::Partition}:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${SageMakerEndpointName}
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - rekognition:DetectFaces
                Resource: "*"
              - Effect: Allow
                Action:
                  - polly:SynthesizeSpeech
                Resource: "*"
        - PolicyName: PipelineManageConnections
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${StageName}/POST/@connections/*

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WS_Connect
      Handler: handlers.ws_connect.handler
      Role: !GetAtt SignalLambdaRole.Arn
      MemorySize: 128
      Description: Registers a WebSocket connection in the Sessions table.

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WS_Disconnect
      Handler: handlers.ws_disconnect.handler
      Role: !GetAtt SignalLambdaRole.Arn
      MemorySize: 128
      Description: Removes a WebSocket connection and room membership.

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  JoinRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_JoinRoom
      Handler: handlers.join_room.handler
      Role: !GetAtt SignalLambdaRole.Arn
      MemorySize: 256
      Description: Persists a connection in a room and returns JOIN_ROOM ack.

  JoinRoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref JoinRoomFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  LeaveRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_LeaveRoom
      Handler: handlers.leave_room.handler
      Role: !GetAtt SignalLambdaRole.Arn
      MemorySize: 256
      Description: Removes a connection from a room and returns LEAVE_ROOM ack.

  LeaveRoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LeaveRoomFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  BroadcastCaptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_BroadcastCaption
      Handler: handlers.broadcast_caption.handler
      Role: !GetAtt SignalLambdaRole.Arn
      Timeout: 15
      Description: Fans CAPTION events out to all room participants.

  ProcessFrameFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_ProcessFrame
      Handler: handlers.process_frame.handler
      Role: !GetAtt PipelineLambdaRole.Arn
      MemorySize: 1024
      Description: Handles INFER and $default frames through SageMaker, Bedrock, Polly, and WebSocket responses.

  ProcessFramePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessFrameFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  SweepFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WS_Sweep
      Handler: handlers.sweep.handler
      Role: !GetAtt PipelineLambdaRole.Arn
      MemorySize: 256
      Timeout: 55
      Description: Scheduled sweep that flushes stale session buffers.
      Environment:
        Variables:
          SWEEP_PAUSE_MS: "1500"
      Events:
        SweepSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Minimum EventBridge cadence for stale-session sweep.
            Enabled: true

  WarmEndpointFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WarmEndpoint
      Handler: handlers.warm_endpoint.handler
      Role: !GetAtt PipelineLambdaRole.Arn
      MemorySize: 128
      Timeout: 15
      Description: Keeps the SageMaker endpoint warm.
      Events:
        WarmSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Prevents SageMaker cold-start latency.
            Enabled: true

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations

  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProcessFrameFunction.Arn}/invocations

  InferIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProcessFrameFunction.Arn}/invocations

  JoinRoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${JoinRoomFunction.Arn}/invocations

  LeaveRoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LeaveRoomFunction.Arn}/invocations

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${ConnectIntegration}

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${DisconnectIntegration}

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub integrations/${DefaultIntegration}

  InferRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: INFER
      AuthorizationType: NONE
      Target: !Sub integrations/${InferIntegration}

  JoinRoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: JOIN_ROOM
      AuthorizationType: NONE
      Target: !Sub integrations/${JoinRoomIntegration}

  LeaveRoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: LEAVE_ROOM
      AuthorizationType: NONE
      Target: !Sub integrations/${LeaveRoomIntegration}

  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: NIMBUS_PROD_Sessions
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  RoomsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: NIMBUS_PROD_Rooms
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: roomId
          KeyType: HASH
        - AttributeName: connectionId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub nimbus-prod-artifacts-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  TTSAudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nimbus-prod-tts-audio-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAudioAfter1Day
            Status: Enabled
            ExpirationInDays: 1

  ConfigBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub nimbus-prod-config-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  WsConnectLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_WS_Connect
      RetentionInDays: 14

  WsDisconnectLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_WS_Disconnect
      RetentionInDays: 14

  JoinRoomLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_JoinRoom
      RetentionInDays: 14

  LeaveRoomLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_LeaveRoom
      RetentionInDays: 14

  BroadcastCaptionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_BroadcastCaption
      RetentionInDays: 14

  ProcessFrameLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_ProcessFrame
      RetentionInDays: 14

  SweepLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_WS_Sweep
      RetentionInDays: 14

  WarmEndpointLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_WarmEndpoint
      RetentionInDays: 14

Outputs:
  WebSocketURL:
    Description: Client WebSocket endpoint.
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
    Export:
      Name: NIMBUS-PROD-WebSocketURL

  WebSocketManagementEndpoint:
    Description: API Gateway management endpoint used by backend fan-out.
    Value: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  WebSocketApiId:
    Description: API Gateway WebSocket API id.
    Value: !Ref WebSocketApi

  SessionsTableName:
    Description: DynamoDB Sessions table.
    Value: !Ref SessionsTable
    Export:
      Name: NIMBUS-PROD-SessionsTable

  RoomsTableName:
    Description: DynamoDB Rooms table.
    Value: !Ref RoomsTable
    Export:
      Name: NIMBUS-PROD-RoomsTable

  ArtifactsBucketName:
    Description: S3 bucket for model and deployment artifacts.
    Value: !Ref ArtifactsBucket
    Export:
      Name: NIMBUS-PROD-ArtifactsBucket

  ModelArtifactsBucketName:
    Description: Compatibility output for ML pipeline consumers.
    Value: !Ref ArtifactsBucket
    Export:
      Name: NIMBUS-PROD-ModelArtifactsBucket

  ConfigBucketName:
    Description: S3 bucket for runtime config such as ssml_prosody_map.json.
    Value: !Ref ConfigBucket
    Export:
      Name: NIMBUS-PROD-ConfigBucket

  TTSAudioBucketName:
    Description: S3 bucket for Polly audio output.
    Value: !Ref TTSAudioBucket
    Export:
      Name: NIMBUS-PROD-TTSAudioBucket

  BroadcastCaptionFunctionName:
    Description: Lambda name used by integration tests and upstream invocations.
    Value: !Ref BroadcastCaptionFunction

  BroadcastCaptionFunctionArn:
    Description: Lambda ARN for caption fan-out.
    Value: !GetAtt BroadcastCaptionFunction.Arn

  ProcessFrameFunctionName:
    Description: Lambda name behind INFER and $default routes.
    Value: !Ref ProcessFrameFunction
