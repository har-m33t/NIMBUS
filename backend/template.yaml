AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  NIMBUS — Real-time ASL Interpretation Backend.
  Member 1 (Infrastructure): API Gateway WebSocket signaling, DynamoDB
    (Sessions / Rooms / UserPreferences), Mediasoup SFU EC2 host, IAM roles,
    CloudWatch log groups, BroadcastCaption Lambda.
  Member 2 (AI Pipeline): ProcessFrame / Sweep / WarmEndpoint Lambdas;
    SageMaker + Bedrock + Polly integrations.
  Member 3 (ML Pipeline): see Outputs.SageMakerEndpointName + Outputs.ModelArtifactsBucket

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]
    Description: Logical deployment environment (surfaced as ENVIRONMENT env var).

  StageName:
    Type: String
    Default: prod
    Description: WebSocket API stage name (used in client-facing wss:// URL).

  SageMakerEndpointName:
    Type: String
    Default: nimbus-prod-asl-endpoint
    Description: Name of the SageMaker ASL inference endpoint (Member 3 owns this).

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock foundation model ID for gloss→English interpretation.

  DeployMediasoupEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true to deploy mediasoup EC2 resources; keep false for backend-only deploys.

  MediasoupVpcId:
    Type: String
    Default: ""
    Description: VPC in which to launch the mediasoup SFU EC2 instance. Leave blank to skip EC2 deployment.
  MediasoupSubnetId:
    Type: String
    Default: ""
    Description: Public subnet for the mediasoup SFU (needs IGW route).
  MediasoupKeyPairName:
    Type: String
    Default: ""
    Description: Existing EC2 key pair used for SSH to the mediasoup instance.
  MediasoupAdminSshCidr:
    Type: String
    Default: 0.0.0.0/32
    Description: CIDR allowed to SSH to the SFU (tighten before production).

  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth 2.0 client ID for federated sign-in. Leave blank to skip Google IdP.
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google OAuth 2.0 client secret.
  CognitoDomainPrefix:
    Type: String
    Default: nimbus-prod
    Description: Prefix for the Cognito Hosted UI domain (must be globally unique).
  WebAppOrigin:
    Type: String
    Default: ""
    Description: Frontend origin URL (e.g. https://d1234.cloudfront.net) for OAuth callback.
  MediasoupAmiSsmParameter:
    Type: String
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: SSM parameter path resolving to the latest Amazon Linux 2023 AMI.
  MediasoupAnnouncedIp:
    Type: String
    Default: ""
    Description: |
      Public IP mediasoup advertises in ICE candidates. Leave blank on first
      deploy; update to the Elastic IP after the stack is created.

Conditions:
  MediasoupExplicitlyEnabled: !Equals [!Ref DeployMediasoupEnabled, "true"]
  HasMediasoupVpcId: !Not [!Equals [!Ref MediasoupVpcId, ""]]
  HasMediasoupSubnetId: !Not [!Equals [!Ref MediasoupSubnetId, ""]]
  HasMediasoupKeyPairName: !Not [!Equals [!Ref MediasoupKeyPairName, ""]]
  DeployMediasoup: !And
    - !Condition MediasoupExplicitlyEnabled
    - !Condition HasMediasoupVpcId
    - !Condition HasMediasoupSubnetId
    - !Condition HasMediasoupKeyPairName
  HasGoogleOAuth: !And
    - !Not [!Equals [!Ref GoogleClientId, ""]]
    - !Not [!Equals [!Ref GoogleClientSecret, ""]]
  NoGoogleOAuth: !Or
    - !Equals [!Ref GoogleClientId, ""]
    - !Equals [!Ref GoogleClientSecret, ""]
  HasWebAppOrigin: !Not [!Equals [!Ref WebAppOrigin, ""]]

Globals:
  Function:
    Runtime: python3.13
    Architectures: [x86_64]
    CodeUri: src/
    Timeout: 29
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: nimbus
        POWERTOOLS_METRICS_NAMESPACE: NIMBUS
        LOG_LEVEL: INFO
        ENVIRONMENT: !Ref Environment
        SESSIONS_TABLE: !Ref SessionsTable
        ROOMS_TABLE: !Ref RoomsTable
        USER_PREFS_TABLE: !Ref UserPreferencesTable
        SAGEMAKER_ENDPOINT: !Ref SageMakerEndpointName
        TTS_BUCKET: !Ref TTSAudioBucket
        CONFIG_BUCKET: !Ref ConfigBucket
        BEDROCK_MODEL_ID: !Ref BedrockModelId

Resources:

  # ── Cognito User Pool (Authentication) ────────────────────────────────────────

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub NIMBUS_${Environment}_UserPool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolAddOns:
        AdvancedSecurityMode: "OFF"

  CognitoUserPoolClientWithGoogle:
    Type: AWS::Cognito::UserPoolClient
    Condition: HasGoogleOAuth
    DependsOn: CognitoGoogleIdP
    Properties:
      ClientName: !Sub NIMBUS_${Environment}_WebClient
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      SupportedIdentityProviders:
        - COGNITO
        - Google
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - "http://localhost:5173/oauth/callback"
        - !If [HasWebAppOrigin, !Sub "${WebAppOrigin}/oauth/callback", !Ref "AWS::NoValue"]
      LogoutURLs:
        - "http://localhost:5173/signin"
        - !If [HasWebAppOrigin, !Sub "${WebAppOrigin}/signin", !Ref "AWS::NoValue"]

  CognitoUserPoolClientNoGoogle:
    Type: AWS::Cognito::UserPoolClient
    Condition: NoGoogleOAuth
    Properties:
      ClientName: !Sub NIMBUS_${Environment}_WebClient
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - "http://localhost:5173/oauth/callback"
        - !If [HasWebAppOrigin, !Sub "${WebAppOrigin}/oauth/callback", !Ref "AWS::NoValue"]
      LogoutURLs:
        - "http://localhost:5173/signin"
        - !If [HasWebAppOrigin, !Sub "${WebAppOrigin}/signin", !Ref "AWS::NoValue"]

  # ── Cognito Hosted UI Domain ─────────────────────────────────────────────────

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref CognitoUserPool

  # ── Google Identity Provider (conditional) ───────────────────────────────────

  CognitoGoogleIdP:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogleOAuth
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "email openid profile"
      AttributeMapping:
        email: email
        name: name
        username: sub

  # ── WebSocket Lambda Authorizer ──────────────────────────────────────────────

  WsAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub NIMBUS_${Environment}_WS_Authorizer
      Handler: handlers.ws_authorizer.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 128
      Timeout: 5
      Description: >
        WebSocket $connect authorizer — validates Cognito JWT from
        query string ?token=<idToken> and returns IAM policy.
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_REGION: !Ref AWS::Region

  WsAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsAuthorizerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref WebSocketApi
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsAuthorizerFunction.Arn}/invocations
      IdentitySource:
        - route.request.querystring.token
      Name: CognitoJwtAuthorizer

  # ── WebSocket API (PROTOCOLS.md §1, §5.2) ───────────────────────────────────

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: NIMBUS_PROD_WS
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref WebSocketAuthorizer
      Target: !Sub integrations/${ConnectIntegration}

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${DisconnectIntegration}

  InferRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: INFER
      AuthorizationType: NONE
      Target: !Sub integrations/${ProcessFrameIntegration}

  JoinRoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: JOIN_ROOM
      AuthorizationType: NONE
      Target: !Sub integrations/${JoinRoomIntegration}

  LeaveRoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: LEAVE_ROOM
      AuthorizationType: NONE
      Target: !Sub integrations/${LeaveRoomIntegration}

  WebRtcSignalRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: WEBRTC_SIGNAL
      AuthorizationType: NONE
      Target: !Sub integrations/${WebRtcSignalIntegration}

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WSConnectFunction.Arn}/invocations

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WSDisconnectFunction.Arn}/invocations

  ProcessFrameIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProcessFrameFunction.Arn}/invocations

  JoinRoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${JoinRoomFunction.Arn}/invocations

  LeaveRoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LeaveRoomFunction.Arn}/invocations

  WebRtcSignalIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebRtcSignalFunction.Arn}/invocations

  ApiDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - InferRoute
      - JoinRoomRoute
      - LeaveRoomRoute
      - WebRtcSignalRoute
    Properties:
      ApiId: !Ref WebSocketApi

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  # ── IAM (PROTOCOLS.md §5.5) ─────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NIMBUS_PROD_LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDbAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !GetAtt RoomsTable.Arn
                  - !GetAtt UserPreferencesTable.Arn
        - PolicyName: ApiGwManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: execute-api:ManageConnections
                Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  MediasoupEC2Role:
    Type: AWS::IAM::Role
    Condition: DeployMediasoup
    Properties:
      RoleName: NIMBUS_PROD_MediasoupEC2Role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: RoomsTableAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RoomsTable.Arn
        - PolicyName: ConfigBucketRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: arn:aws:s3:::nimbus-prod-config/*
        - PolicyName: TurnConfigRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/NIMBUS_PROD_TURNConfig

  MediasoupInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: DeployMediasoup
    Properties:
      InstanceProfileName: NIMBUS_PROD_MediasoupInstanceProfile
      Roles:
        - !Ref MediasoupEC2Role

  # ── Lambda Functions (Member 1 — signaling) ─────────────────────────────────

  WSConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WS_Connect
      Handler: handlers.ws_connect.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 128
      Description: WebSocket $connect — registers connection (writes sk=STATE + CONN# index).

  WSConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WSConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WSDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WS_Disconnect
      Handler: handlers.ws_disconnect.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 128
      Description: WebSocket $disconnect — clears sk=STATE + CONN# index, broadcasts PEER_LEFT.
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  WSDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WSDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  JoinRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_JoinRoom
      Handler: handlers.join_room.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  JoinRoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref JoinRoomFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  LeaveRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_LeaveRoom
      Handler: handlers.leave_room.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  LeaveRoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LeaveRoomFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebRtcSignalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WebRtcSignal
      Handler: handlers.webrtc_signal.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  WebRtcSignalPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebRtcSignalFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  BroadcastCaptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_BroadcastCaption
      Handler: handlers.broadcast_caption.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  # ── Lambda Functions (Member 2 — AI pipeline) ───────────────────────────────

  ProcessFrameFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_ProcessFrame
      Handler: handlers.process_frame.handler
      MemorySize: 1024
      Description: "INFER route: SageMaker → Bedrock → Polly → CAPTION + SIGNAL"
      Environment:
        Variables:
          BROADCAST_CAPTION_ARN: !GetAtt BroadcastCaptionFunction.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3WritePolicy:
            BucketName: !Ref TTSAudioBucket
        - S3ReadPolicy:
            BucketName: !Ref ConfigBucket
        - LambdaInvokePolicy:
            FunctionName: !Ref BroadcastCaptionFunction
        - Statement:
            # SageMaker inference — wildcard so deploy succeeds before Member 3 creates the endpoint.
            - Effect: Allow
              Action: sagemaker:InvokeEndpoint
              Resource: !Sub arn:${AWS::Partition}:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*
            # Rekognition — face crop emotion detection (PROTOCOLS.md §3.2)
            - Effect: Allow
              Action: rekognition:DetectFaces
              Resource: "*"
            # Bedrock — C3: < 1 RPS enforced in code via DDB token bucket
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
            # Polly — C4: audio delivered via presigned S3 URL, not public endpoint
            - Effect: Allow
              Action: polly:SynthesizeSpeech
              Resource: "*"
            # Translate — multilingual output (Global Accessibility Flex)
            - Effect: Allow
              Action: translate:TranslateText
              Resource: "*"
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${StageName}/*

  ProcessFramePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessFrameFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/INFER

  SweepFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WS_Sweep
      Handler: handlers.sweep.handler
      MemorySize: 256
      Timeout: 55
      Description: "Scheduled sweep: flush stale gloss buffers (PROTOCOLS.md §2.2 rule 3)"
      Environment:
        Variables:
          SWEEP_PAUSE_MS: "1500"
          APIGW_MANAGEMENT_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
      Events:
        SweepSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Scan all active sessions for stale buffers every minute
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3WritePolicy:
            BucketName: !Ref TTSAudioBucket
        - S3ReadPolicy:
            BucketName: !Ref ConfigBucket
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}
            - Effect: Allow
              Action: polly:SynthesizeSpeech
              Resource: "*"
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${StageName}/*

  # ── HTTP API for user preferences (POST /preferences) ───────────────────────

  PreferencesHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  PreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub NIMBUS_${Environment}_SavePreferences
      Handler: handlers.preferences.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 128
      Timeout: 10
      Description: "POST /preferences — save per-user Polly voice preference to DynamoDB"
      Events:
        SavePreferences:
          Type: HttpApi
          Properties:
            Path: /preferences
            Method: POST
            ApiId: !Ref PreferencesHttpApi
        PreferencesPreflight:
          Type: HttpApi
          Properties:
            Path: /preferences
            Method: OPTIONS
            ApiId: !Ref PreferencesHttpApi

  WarmEndpointFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: NIMBUS_PROD_WarmEndpoint
      Handler: handlers.warm_endpoint.handler
      MemorySize: 128
      Timeout: 15
      Description: "Keeps SageMaker endpoint warm every 5 min to prevent cold starts"
      Events:
        WarmSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Prevent SageMaker cold-start latency
            Enabled: true
      Policies:
        - Statement:
            - Effect: Allow
              Action: sagemaker:InvokeEndpoint
              Resource: !Sub arn:${AWS::Partition}:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*

  # ── CloudWatch Log Groups (PROTOCOLS §5.7, 14-day retention) ────────────────

  # Connect/disconnect log groups are pre-existing in deployed environments.
  # Managing them here can trigger existence-check failures during stack updates.
  JoinRoomLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_JoinRoom
      RetentionInDays: 14
  LeaveRoomLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_LeaveRoom
      RetentionInDays: 14
  BroadcastCaptionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_BroadcastCaption
      RetentionInDays: 14
  WebRtcSignalLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/NIMBUS_PROD_WebRtcSignal
      RetentionInDays: 14

  # ── DynamoDB (PROTOCOLS.md §2, §5.3) ────────────────────────────────────────

  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Intentionally omit TableName so CloudFormation can replace this table
      # during key-schema migrations without failing on custom-name constraints.
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  RoomsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: NIMBUS_PROD_Rooms
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: roomId
          KeyType: HASH
        - AttributeName: connectionId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: NIMBUS_PROD_UserPreferences
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  VocabularyTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: NIMBUS_PROD_Vocabulary
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: gloss
          AttributeType: S
      KeySchema:
        - AttributeName: gloss
          KeyType: HASH

  # ── S3 Buckets — all with Block Public Access (C4) ──────────────────────────

  ModelArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub nimbus-prod-model-artifacts-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  TTSAudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nimbus-prod-tts-audio-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAudioAfter1Day
            Status: Enabled
            ExpirationInDays: 1
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  ConfigBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub nimbus-prod-config-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  SessionExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub nimbus-prod-session-exports-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveAfter30Days
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
            ExpirationInDays: 90

  # ── Mediasoup SFU on EC2 (PROTOCOLS.md §5.6) ────────────────────────────────

  MediasoupSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: DeployMediasoup
    Properties:
      GroupName: NIMBUS_PROD_MediasoupSG
      GroupDescription: NIMBUS mediasoup SFU - WSS + WebRTC media
      VpcId: !Ref MediasoupVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: WSS signaling
        - IpProtocol: udp
          FromPort: 40000
          ToPort: 49999
          CidrIp: 0.0.0.0/0
          Description: WebRTC media (mediasoup WebRtcTransport range)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MediasoupAdminSshCidr
          Description: SSH, admin-only CIDR

  MediasoupEIP:
    Type: AWS::EC2::EIP
    Condition: DeployMediasoup
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: NIMBUS_PROD_MediasoupEIP

  MediasoupInstance:
    Type: AWS::EC2::Instance
    Condition: DeployMediasoup
    Properties:
      InstanceType: c5.xlarge
      ImageId: !Sub "{{resolve:ssm:${MediasoupAmiSsmParameter}}}"
      KeyName: !Ref MediasoupKeyPairName
      SubnetId: !Ref MediasoupSubnetId
      SecurityGroupIds:
        - !Ref MediasoupSecurityGroup
      IamInstanceProfile: !Ref MediasoupInstanceProfile
      Tags:
        - Key: Name
          Value: NIMBUS_PROD_Mediasoup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y git python3 make gcc gcc-c++ amazon-cloudwatch-agent

          # Node.js 20 from NodeSource
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y nodejs

          # Clone mediasoup server bundle (replace with internal artifact bucket in prod)
          install -d -o ec2-user -g ec2-user /opt/nimbus-mediasoup
          cd /opt/nimbus-mediasoup
          # Expect the deploy pipeline to rsync infrastructure/mediasoup/ here.
          # For first boot we install runtime only; code is synced post-deploy.

          # CloudWatch agent config
          cat <<'CW' >/opt/aws/amazon-cloudwatch-agent/etc/config.json
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/nimbus-mediasoup.log",
                      "log_group_name": "/ec2/nimbus-prod/mediasoup",
                      "log_stream_name": "{instance_id}",
                      "retention_in_days": 14
                    }
                  ]
                }
              }
            }
          }
          CW
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 -s \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/config.json

          # systemd unit — code is rsync'd in at deploy time.
          cat <<UNIT >/etc/systemd/system/nimbus-mediasoup.service
          [Unit]
          Description=NIMBUS mediasoup SFU
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/nimbus-mediasoup
          Environment=NODE_ENV=production
          Environment=MEDIASOUP_ANNOUNCED_IP=${MediasoupAnnouncedIp}
          Environment=MEDIASOUP_MIN_PORT=40000
          Environment=MEDIASOUP_MAX_PORT=49999
          Environment=WSS_PORT=443
          Environment=ROOMS_TABLE=${RoomsTable}
          Environment=TURN_PARAMETER=NIMBUS_PROD_TURNConfig
          Environment=AWS_REGION=${AWS::Region}
          ExecStart=/usr/bin/node src/server.js
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:/var/log/nimbus-mediasoup.log
          StandardError=append:/var/log/nimbus-mediasoup.log

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable nimbus-mediasoup.service

  MediasoupEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: DeployMediasoup
    Properties:
      AllocationId: !GetAtt MediasoupEIP.AllocationId
      InstanceId: !Ref MediasoupInstance

  MediasoupLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: DeployMediasoup
    Properties:
      LogGroupName: /ec2/nimbus-prod/mediasoup
      RetentionInDays: 14

  TurnConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: NIMBUS_PROD_TURNConfig
      Type: String
      Description: JSON-encoded TURN server config read by the mediasoup SFU on startup.
      Value: '{"iceServers":[]}'

  # ── Static Web Hosting (S3 + CloudFront) ───────────────────────────────────

  WebHostingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "nimbus-${Environment}-web-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "nimbus-${Environment}-web-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebHostingBucket.RegionalDomainName
            OriginAccessControlId: !Ref WebOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  WebHostingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebHostingBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebHostingBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

# ── Outputs ────────────────────────────────────────────────────────────────────
# Handoff values your teammates need after `sam deploy`.

Outputs:

  WebSocketURL:
    Description: >
      [Member 1 — Frontend] Connect to this WSS URL from the Python Zoom client.
      Set NIMBUS_WS_URL env var in frontend/src/main.py to this value.
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
    Export:
      Name: NIMBUS-PROD-WebSocketURL

  WebSocketApiId:
    Description: API Gateway WebSocket API ID (for Management API calls).
    Value: !Ref WebSocketApi

  SageMakerEndpointName:
    Description: >
      [Member 3 — ML Pipeline] Deploy your model to this endpoint name.
    Value: !Ref SageMakerEndpointName
    Export:
      Name: NIMBUS-PROD-SageMakerEndpoint

  ModelArtifactsBucketName:
    Description: >
      [Member 3 — ML Pipeline] Upload model.tar.gz here before creating the
      SageMaker model. Path: s3://<bucket>/models/nimbus-asl/model.tar.gz
    Value: !Ref ModelArtifactsBucket
    Export:
      Name: NIMBUS-PROD-ModelArtifactsBucket

  SessionsTableName:
    Description: DynamoDB Sessions table (gloss buffer, captions, rate-limit bucket).
    Value: !Ref SessionsTable
    Export:
      Name: NIMBUS-PROD-SessionsTable

  RoomsTableName:
    Value: !Ref RoomsTable

  UserPreferencesTableName:
    Value: !Ref UserPreferencesTable

  ConfigBucketName:
    Description: >
      Upload ssml_prosody_map.json here to retune Polly voice without redeployment.
    Value: !Ref ConfigBucket
    Export:
      Name: NIMBUS-PROD-ConfigBucket

  TTSAudioBucketName:
    Description: Polly MP3 files land here; served via presigned URL (5-min TTL).
    Value: !Ref TTSAudioBucket
    Export:
      Name: NIMBUS-PROD-TTSAudioBucket

  BroadcastCaptionFunctionArn:
    Description: ARN for Member 2 ProcessFrame to invoke after CAPTION is ready.
    Value: !GetAtt BroadcastCaptionFunction.Arn

  MediasoupPublicIp:
    Condition: DeployMediasoup
    Description: Mediasoup SFU Elastic IP (announce this to browser clients).
    Value: !Ref MediasoupEIP

  PreferencesApiUrl:
    Description: >
      [Frontend] HTTP endpoint for saving user voice preferences.
      Set VITE_PREFERENCES_API_URL to this value in web/.env.local.
    Value: !Sub https://${PreferencesHttpApi}.execute-api.${AWS::Region}.amazonaws.com/preferences
    Export:
      Name: !Sub NIMBUS-${Environment}-PreferencesApiUrl

  CognitoUserPoolId:
    Description: Cognito User Pool ID for frontend auth configuration.
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub NIMBUS-${Environment}-CognitoUserPoolId

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID for frontend auth configuration.
    Value: !If [HasGoogleOAuth, !Ref CognitoUserPoolClientWithGoogle, !Ref CognitoUserPoolClientNoGoogle]
    Export:
      Name: !Sub NIMBUS-${Environment}-CognitoClientId

  CognitoDomain:
    Description: Cognito Hosted UI domain for OAuth (Google sign-in).
    Value: !Sub ${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com

  WebHostingBucketName:
    Description: S3 bucket for the React frontend build output.
    Value: !Ref WebHostingBucket

  CloudFrontDomainName:
    Description: CloudFront distribution domain for the web app (https://<domain>).
    Value: !GetAtt WebDistribution.DomainName

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation).
    Value: !Ref WebDistribution
